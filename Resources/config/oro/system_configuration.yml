system_configuration:
  groups:
    genaker_oroai_group:
      title: 'Oro AI Assistant'
      icon: 'fa-magic'
      page_reload: false

    genaker_oroai_settings:
      title: 'AI Assistant Settings'
      page_reload: false

    genaker_oroai_tools:
      title: 'Enabled Tools'
      page_reload: false

  fields:
    genaker_oro_ai.provider:
      data_type: string
      type: Symfony\Component\Form\Extension\Core\Type\ChoiceType
      search_type: text
      options:
        label: 'LLM Provider'
        tooltip: 'Select the LLM provider. Can be overridden with OROAI_PROVIDER env var.'
        required: true
        constraints:
          - NotBlank: ~
          - Choice:
              choices: ['openai', 'anthropic', 'gemini']
        choices:
          'OpenAI': 'openai'
          'Anthropic (Claude)': 'anthropic'
          'Google Gemini': 'gemini'
      priority: 100

    genaker_oro_ai.api_key:
      data_type: string
      type: Oro\Bundle\FormBundle\Form\Type\OroEncodedPlaceholderPasswordType
      search_type: text
      options:
        label: 'API Key'
        tooltip: 'Provider API key. Can be overridden with OROAI_API_KEY env var.'
        resettable: true
        required: false
      priority: 95

    genaker_oro_ai.api_url:
      data_type: string
      type: Symfony\Component\Form\Extension\Core\Type\TextType
      search_type: text
      options:
        label: 'API URL (optional)'
        tooltip: 'Override the default API endpoint. Leave empty for the provider default.'
        required: false
        attr:
          placeholder: 'Leave empty for default'
      priority: 90

    genaker_oro_ai.model:
      data_type: string
      type: Genaker\Bundle\OroAI\Form\Type\AiModelChoiceType
      search_type: text
      options:
        label: 'Model'
        tooltip: 'Select the model to use. Leave empty to use the provider default. Models are defined in Resources/config/ai_models.yml.'
      priority: 85

    genaker_oro_ai.custom_instructions:
      data_type: string
      type: Symfony\Component\Form\Extension\Core\Type\TextareaType
      search_type: text
      options:
        label: 'Custom Instructions'
        tooltip: >
          Free-form instructions prepended ahead of the built-in system prompt on every AI call
          (e.g. house style, company terminology, extra guardrails). Can also be set with the
          OROAI_CUSTOM_INSTRUCTIONS env var. Leave empty to use only the built-in prompt.
        required: false
        attr:
          rows: 6
          placeholder: "e.g. Always refer to customers as \"accounts\". Never suggest deleting records — recommend disabling them instead."
      priority: 83

    genaker_oro_ai.additional_guidelines:
      data_type: string
      type: Symfony\Component\Form\Extension\Core\Type\TextareaType
      search_type: text
      options:
        label: 'Additional Guidelines'
        tooltip: >
          Guidelines merged AFTER every bundle's oro_ai_guidelines.yml, with override
          semantics: a YAML mapping ("my_key: My rule text") adds or replaces the bundle
          guideline with that key, and "my_key: ~" removes it entirely. Plain text lines
          (no keys) are simply appended. Can also be set with the
          OROAI_ADDITIONAL_GUIDELINES env var.
        required: false
        attr:
          rows: 6
          placeholder: "links: Always provide clickable admin URLs.\nsome_bundle_key: ~   # removes that bundle guideline"
      priority: 82

    genaker_oro_ai.temperature:
      data_type: string
      type: Symfony\Component\Form\Extension\Core\Type\TextType
      search_type: text
      options:
        label: 'Temperature'
        tooltip: 'LLM temperature (0.0 - 1.0). Lower = more deterministic.'
        required: false
        attr:
          placeholder: '0.3'
      priority: 80

    genaker_oro_ai.max_iterations:
      data_type: string
      type: Symfony\Component\Form\Extension\Core\Type\TextType
      search_type: text
      options:
        label: 'Max Tool Iterations'
        tooltip: 'Maximum number of tool-calling rounds per request.'
        required: false
        attr:
          placeholder: '5'
      priority: 75

    genaker_oro_ai.max_retries:
      data_type: string
      type: Symfony\Component\Form\Extension\Core\Type\TextType
      search_type: text
      options:
        label: 'API Retry Attempts'
        tooltip: 'Retries on 429 rate-limit errors with exponential backoff (0 = disabled, max 5). Each retry doubles the wait: 0.5s → 1s → 2s → 4s → 8s.'
        required: false
        attr:
          placeholder: '0'
      priority: 72

    genaker_oro_ai.embedding_api_key:
      data_type: string
      type: Oro\Bundle\FormBundle\Form\Type\OroEncodedPlaceholderPasswordType
      search_type: text
      options:
        label: 'Embedding API Key'
        tooltip: 'API key for embedding provider (defaults to main API key if empty).'
        resettable: true
        required: false
      priority: 70

    genaker_oro_ai.embedding_url:
      data_type: string
      type: Symfony\Component\Form\Extension\Core\Type\TextType
      search_type: text
      options:
        label: 'Embedding API URL (optional)'
        tooltip: 'Override embedding endpoint. Leave empty for OpenAI default.'
        required: false
        attr:
          placeholder: 'https://api.openai.com/v1/embeddings'
      priority: 65

    genaker_oro_ai.embedding_model:
      data_type: string
      type: Symfony\Component\Form\Extension\Core\Type\TextType
      search_type: text
      options:
        label: 'Embedding Model'
        tooltip: 'Embedding model name.'
        required: false
        attr:
          placeholder: 'text-embedding-3-small'
      priority: 60

    genaker_oro_ai.sql_tool_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      search_type: text
      options:
        label: 'Enable SQL Query Tool'
        tooltip: 'Allow the AI to run read-only SELECT queries against the database.'
      priority: 55

    genaker_oro_ai.sql_row_limit:
      data_type: string
      type: Symfony\Component\Form\Extension\Core\Type\TextType
      search_type: text
      options:
        label: 'SQL Row Limit'
        tooltip: 'Maximum number of rows returned by SQL queries.'
        required: false
        attr:
          placeholder: '200'
      priority: 50

    genaker_oro_ai.rag_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      search_type: text
      options:
        label: 'Enable RAG'
        tooltip: 'Enable retrieval-augmented generation from the knowledge base.'
      priority: 45

    genaker_oro_ai.rag_top_k:
      data_type: string
      type: Symfony\Component\Form\Extension\Core\Type\TextType
      search_type: text
      options:
        label: 'RAG Top-K Results'
        tooltip: 'Number of knowledge base chunks to include as context.'
        required: false
        attr:
          placeholder: '5'
      priority: 40

    genaker_oro_ai.learning_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      search_type: text
      options:
        label: 'Enable Learning'
        tooltip: 'When enabled, successful SQL corrections are saved to improve future queries.'
      priority: 35

    genaker_oro_ai.harness_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      search_type: text
      options:
        label: 'Enable Resolution Harness'
        tooltip: >
          When enabled, the agent runs in a controlled retry loop. If the first reply is incomplete
          the harness gathers more context via tools and retries. Resolved answers are saved to
          var/cache/memory/ for future RAG retrieval. Disable to use the single-pass agent.
      priority: 32

    genaker_oro_ai.harness_max_tries:
      data_type: string
      type: Symfony\Component\Form\Extension\Core\Type\TextType
      search_type: text
      options:
        label: 'Harness Max Tries'
        tooltip: 'Maximum number of resolution attempts before returning the best available answer (min 1).'
        required: false
        attr:
          placeholder: '10'
      priority: 30

    genaker_oro_ai.research_max_iterations:
      data_type: string
      type: Symfony\Component\Form\Extension\Core\Type\TextType
      search_type: text
      options:
        label: 'Research Sub-Agent Max Steps'
        tooltip: >
          Max tool-calling rounds for the research sub-agent's own investigation loop (see the
          "Research" tool below), separate from and typically higher than Max Tool Iterations,
          since a delegated deep-dive legitimately needs more steps than a single turn.
        required: false
        attr:
          placeholder: '8'
      priority: 28

    genaker_oro_ai.tool_sql_query_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'SQL Query'
        tooltip: 'Run read-only SELECT queries against the database.'
      priority: 100

    genaker_oro_ai.tool_schema_inspector_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Schema Inspector'
        tooltip: 'Inspect database tables and column definitions.'
      priority: 95

    genaker_oro_ai.tool_entity_url_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Entity URL'
        tooltip: 'Generate admin URLs for OroCommerce entities.'
      priority: 90

    genaker_oro_ai.tool_find_entity_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Find Entity'
        tooltip: 'Search for entities by name or identifier.'
      priority: 85

    genaker_oro_ai.tool_skill_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Skills'
        tooltip: >
          Let the agent load step-by-step skills declared by bundles in
          Resources/ai_skills/*.md or Resources/config/oro/oro_ai_skills.yml.
      priority: 81

    genaker_oro_ai.disabled_skills:
      data_type: array
      type: Genaker\Bundle\OroAI\Form\Type\SkillChoiceType
      options:
        label: 'Disabled Skills'
        tooltip: >
          Tick a skill to HIDE it from the agent. Unticked skills stay active, and
          skills added later by any bundle are enabled by default. The list shows
          every skill registered via Resources/ai_skills/*.md or oro_ai_skills.yml.
      priority: 80

    genaker_oro_ai.tool_code_search_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Code Search'
        tooltip: 'Grep the project source (src/, config/, templates/) — read-only, secrets redacted.'
      priority: 79

    genaker_oro_ai.tool_code_read_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Code Read'
        tooltip: 'Read slices of project source files located via Code Search — read-only, secrets redacted.'
      priority: 78

    genaker_oro_ai.tool_console_command_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Console Commands'
        tooltip: >
          Run allowlisted READ-ONLY bin/console commands (debug:*, lint:*, doctrine
          introspection). Extra prefixes via OROAI_CONSOLE_ALLOWED.
      priority: 77

    genaker_oro_ai.tool_doc_search_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Doc Search'
        tooltip: 'Search the OroCommerce knowledge base / documentation.'
      priority: 80

    genaker_oro_ai.tool_config_inspector_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Config Inspector'
        tooltip: 'Read system configuration values.'
      priority: 75

    genaker_oro_ai.tool_entity_metadata_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Entity Metadata'
        tooltip: 'Inspect Doctrine entity mappings and field definitions.'
      priority: 70

    genaker_oro_ai.tool_route_search_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Route Search'
        tooltip: 'Search registered Symfony routes.'
      priority: 65

    genaker_oro_ai.tool_log_reader_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Log Reader'
        tooltip: 'Read application log files. Disable on production to prevent log exposure.'
      priority: 60

    genaker_oro_ai.tool_system_info_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'System Info'
        tooltip: 'Expose PHP/OS/environment information. Disable on production.'
      priority: 55

    genaker_oro_ai.tool_translation_lookup_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Translation Lookup'
        tooltip: 'Look up translation keys and their values.'
      priority: 50

    genaker_oro_ai.tool_user_info_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'User Info'
        tooltip: 'Query user accounts and roles.'
      priority: 45

    genaker_oro_ai.tool_research_enabled:
      data_type: boolean
      type: Oro\Bundle\ConfigBundle\Form\Type\ConfigCheckbox
      options:
        label: 'Research Sub-Agent'
        tooltip: >
          Lets the assistant delegate open-ended, multi-step investigations to a separate
          research sub-agent with its own tool-calling loop, returning one synthesized answer
          instead of a raw trace. Disabled by default -- unlike the other tools, one call spawns
          a whole extra multi-step LLM loop (see "Research Sub-Agent Max Steps" above).
      priority: 40

  tree:
    system_configuration:
      platform:
        children:
          general_setup:
            children:
              genaker_oroai_group:
                children:
                  genaker_oroai_settings:
                    children:
                      - genaker_oro_ai.provider
                      - genaker_oro_ai.api_key
                      - genaker_oro_ai.api_url
                      - genaker_oro_ai.model
                      - genaker_oro_ai.custom_instructions
                      - genaker_oro_ai.additional_guidelines
                      - genaker_oro_ai.temperature
                      - genaker_oro_ai.max_iterations
                      - genaker_oro_ai.max_retries
                      - genaker_oro_ai.embedding_api_key
                      - genaker_oro_ai.embedding_url
                      - genaker_oro_ai.embedding_model
                      - genaker_oro_ai.sql_tool_enabled
                      - genaker_oro_ai.sql_row_limit
                      - genaker_oro_ai.rag_enabled
                      - genaker_oro_ai.rag_top_k
                      - genaker_oro_ai.learning_enabled
                      - genaker_oro_ai.harness_enabled
                      - genaker_oro_ai.harness_max_tries
                      - genaker_oro_ai.research_max_iterations
                  genaker_oroai_tools:
                    children:
                      - genaker_oro_ai.tool_sql_query_enabled
                      - genaker_oro_ai.tool_schema_inspector_enabled
                      - genaker_oro_ai.tool_entity_url_enabled
                      - genaker_oro_ai.tool_find_entity_enabled
                      - genaker_oro_ai.tool_doc_search_enabled
                      - genaker_oro_ai.tool_config_inspector_enabled
                      - genaker_oro_ai.tool_entity_metadata_enabled
                      - genaker_oro_ai.tool_route_search_enabled
                      - genaker_oro_ai.tool_log_reader_enabled
                      - genaker_oro_ai.tool_system_info_enabled
                      - genaker_oro_ai.tool_translation_lookup_enabled
                      - genaker_oro_ai.tool_user_info_enabled
                      - genaker_oro_ai.tool_research_enabled
                      - genaker_oro_ai.tool_skill_enabled
                      - genaker_oro_ai.disabled_skills
                      - genaker_oro_ai.tool_code_search_enabled
                      - genaker_oro_ai.tool_code_read_enabled
                      - genaker_oro_ai.tool_console_command_enabled
